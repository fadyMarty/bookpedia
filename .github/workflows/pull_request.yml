name: Run test

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '11'

      - run: echo ${{ secrets.GOOGLE_SERVICES_CONTENT }} | base64 -d > androidApp/google-services.json

      - name: Run unit tests
        run: ./gradlew clean testDebug
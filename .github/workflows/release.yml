name: Deploy to Google Play

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '11'

      - run: echo ${{ secrets.GOOGLE_SERVICES_CONTENT }} | base64 -d > androidApp/google-services.json

      - name: Run unit tests
        run: ./gradlew clean testDebug

  distribute:
    name: Distribute bundle to Google Play
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '11'

      - run: echo ${{ secrets.GOOGLE_SERVICES_CONTENT }} | base64 -d > androidApp/google-services.json

      - name: Version Bump
        uses: chkfung/android-version-actions@v1.2.3
        with:
          gradlePath: androidApp/build.gradle.kts
          versionCode: ${{ github.run_number }}

      - name: Assemble Release Bundle
        run: ./gradlew bundleRelease

      - name: Sign Release
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: androidApp/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          alias: ${{ secrets.UPLOAD_ALIAS }}
          keyPassword: ${{ secrets.UPLOAD_ALIAS_PASSWORD }}

      - name: Setup Authorization with Google Play Store
        run: echo '${{ secrets.PLAY_AUTH_JSON }}' > service_account.json

      - name: Deploy bundle to Google Play
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJson: service_account.json
          packageName: com.fadymarty.bookpedia
          releaseFiles: androidApp/build/outputs/bundle/release/androidApp-release.aab
          tracks: internal
          status: 'completed'
          whatsNewDirectory: whatsNew/whatsnew